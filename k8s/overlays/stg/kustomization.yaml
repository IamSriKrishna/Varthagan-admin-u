apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: bbapp-stg

resources:
- ../../base

images:
- name: asia-south1-docker.pkg.dev/bb-app-461714/bbapp-images/admin-ui
  newTag: latest

patches:
- path: deployment-patch.yaml
  target:
    kind: Deployment
    name: admin-ui
- path: configmap-patch.yaml
  target:
    kind: ConfigMap
    name: admin-ui-config
- path: ingress-patch.yaml
  target:
    kind: Ingress
    name: admin-ui-ingress

replicas:
- count: 1
  name: admin-ui

labels:
- pairs:
    app: admin-ui
    component: frontend
    environment: staging
    part-of: bbapp
