apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: bbapp-dev

resources:
- ../../base

images:
- name: asia-south1-docker.pkg.dev/bb-app-461714/bbapp-images/admin-ui
  newTag: develop-latest

patches:
- path: configmap-patch.yaml
  target:
    kind: ConfigMap
    name: admin-ui-config

replicas:
- count: 1
  name: admin-ui

labels:
- pairs:
    app: admin-ui
    component: frontend
    environment: development
    part-of: bbapp
