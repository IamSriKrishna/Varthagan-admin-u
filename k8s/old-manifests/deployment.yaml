apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-ui
  namespace: bbapp-dev
  labels:
    app: admin-ui
    version: dev-f9ba8f3-20250623-234736
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-ui
  template:
    metadata:
      labels:
        app: admin-ui
        version: dev-f9ba8f3-20250623-234736
    spec:
      containers:
      - name: admin-ui
        image: gcr.io/bb-app-461714/bbapp-admin-ui:dev-f9ba8f3-20250623-234736
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: ENVIRONMENT
          value: "dev"
        - name: NEXT_PUBLIC_KRATOS_PUBLIC_URL
          value: "http://kratos-public.bbapp-dev.svc.cluster.local:4433"
        - name: NEXT_PUBLIC_HYDRA_PUBLIC_URL
          value: "http://hydra-public.bbapp-dev.svc.cluster.local:4444"
        - name: NEXT_PUBLIC_OATHKEEPER_URL
          value: "http://oathkeeper-proxy.bbapp-dev.svc.cluster.local:4455"
        - name: NEXT_PUBLIC_KETO_READ_URL
          value: "http://keto-read.bbapp-dev.svc.cluster.local:4466"
        - name: NEXT_PUBLIC_KETO_WRITE_URL
          value: "http://keto-write.bbapp-dev.svc.cluster.local:4467"
        - name: NEXT_PUBLIC_APP_URL
          value: "https://admin-ui.bbapp-dev.example.com"
        - name: NEXT_PUBLIC_API_BASE_URL
          value: "http://api.bbapp-dev.svc.cluster.local:8080"
        resources:
          requests:
            memory: "128Mi"
            cpu: "25m"
          limits:
            memory: "256Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: admin-ui-service
  namespace: bbapp-dev
  labels:
    app: admin-ui
spec:
  selector:
    app: admin-ui
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Namespace
metadata:
  name: bbapp-dev
  labels:
    name: bbapp-dev
