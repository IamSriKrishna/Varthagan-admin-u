apiVersion: v1
kind: ConfigMap
metadata:
  name: admin-ui-config
  namespace: bbapp-dev
  labels:
    app: admin-ui
    environment: development
data:
  # Ory Stack URLs - Update these based on your GKE Ory services
  NEXT_PUBLIC_KRATOS_PUBLIC_URL: "https://kratos.bbapp-dev.cluster.local:4433"
  NEXT_PUBLIC_HYDRA_PUBLIC_URL: "https://hydra.bbapp-dev.cluster.local:4444"
  NEXT_PUBLIC_OATHKEEPER_URL: "https://oathkeeper.bbapp-dev.cluster.local:4455"
  NEXT_PUBLIC_KETO_READ_URL: "https://keto.bbapp-dev.cluster.local:4466"
  
  # Application Configuration
  NEXT_PUBLIC_APP_URL: "https://admin-ui.bbapp-dev.example.com"
  NEXT_PUBLIC_API_BASE_URL: "https://api.bbapp-dev.cluster.local"
  NODE_ENV: "production"
  
  # Additional App Config
  NEXT_PUBLIC_APP_NAME: "BBApp Admin"
  NEXT_PUBLIC_APP_VERSION: "1.0.0"
